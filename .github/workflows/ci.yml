name: CI - build & push images

# Déclencheurs :
#  - push sur main           → tag "latest" + "sha-xxxxxxx"
#  - push d'un tag "v*"      → tag de version (ex. v1.2.0, 1.2)
#  - pull request            → build seul, SANS push (validation)
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # On construit le back ET le front avec la même recette (matrice).
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: moby-dock-backend
          - name: frontend
            context: ./frontend
            image: moby-dock-frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion Docker Hub uniquement quand on doit pousser (pas sur les PR)
      - name: Connexion à Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Génère automatiquement les tags : latest, sha-xxxx, version sur tag git
      - name: Calcul des tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
