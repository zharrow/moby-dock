# Lance toute la stack en local : base de données + backend + frontend.
#   docker compose up --build
# Front  → http://localhost:8080
# API    → http://localhost:8000/api/health   (docs : http://localhost:8000/docs)
#
# DOCKERHUB_USERNAME (optionnel) nomme les images comme sur Docker Hub.
# Défini dans .env ou via l'environnement ; "local" par défaut.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moby
      POSTGRES_PASSWORD: moby
      POSTGRES_DB: mobydock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moby -d mobydock"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    image: ${DOCKERHUB_USERNAME:-local}/moby-dock-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://moby:moby@db:5432/mobydock
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ${DOCKERHUB_USERNAME:-local}/moby-dock-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
